<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Productos</ion-title>
    <ion-buttons slot="end">
      <ion-button aria-label="Recargar productos" (click)="loadProducts()">
        <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="products.length; else emptyState">
    <ion-item *ngIf="offline" color="warning">
      <ion-icon name="cloud-offline-outline" slot="start"></ion-icon>
      <ion-label>Mostrando datos guardados sin conexion</ion-label>
    </ion-item>

    <ion-item *ngFor="let product of products; trackBy: trackByProductId">
      <ion-label>
        <h2>{{ product.name }}</h2>
        <p>Stock: {{ product.stock }}</p>
      </ion-label>
      <ion-note slot="end">{{ product.price | currency }}</ion-note>
    </ion-item>
  </ion-list>

  <ng-template #emptyState>
    <section class="empty-state">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <ion-icon *ngIf="!loading" name="cube-outline"></ion-icon>
      <h1>{{ loading ? 'Cargando productos' : 'Sin productos' }}</h1>
      <p *ngIf="errorMessage">{{ errorMessage }}</p>
      <ion-button *ngIf="!loading" fill="outline" (click)="loadProducts()">Reintentar</ion-button>
    </section>
  </ng-template>
</ion-content>
